version: '3.8'

services:
  destructive-farm:
    build: server
    container_name: farmer
    ports:
      - "5002:5002"
    restart: unless-stopped
  attack-map:
    build: attack-map
    container_name: attack-map
    environment:
      - WEBSOCKET_URI=ws://localhost:5002
      - DISCORD_WEBHOOK_URL=https://discord.com
      - TEAM_IDENTIFIER=gua
    restart: unless-stopped
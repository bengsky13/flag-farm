<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="/static/favicon.png">

    <title>Bengsky Farm - Scripts</title>

    <link href="/static/css/bootswatch-flatly.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-0">
    <img class="logo" src="/static/img/dvteam_white.png">
    <div class="navbar-brand">Bengsky Farm</div>
    <div class="navbar-nav">
        <a class="nav-item nav-link" href="/">Flags</a>
        <a class="nav-item nav-link active" href="/scripts">Scripts</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-lg-8">
            <div class="card border-light">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="card-title mb-0">Saved Exploit Scripts</h4>
                        <span class="badge badge-info">{{ scripts|length }} Total</span>
                    </div>

                    <table class="table table-hover align-middle">
                        <thead>
                        <tr class="table-secondary">
                            <th scope="col">Challenge Folder</th>
                            <th scope="col">Script Name</th>
                            <th scope="col" class="text-right">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        {% for script in scripts %}
                        <tr>
                            <td><strong>{{ script.chall_name }}</strong></td>
                            <td><code>{{ script.exp_name }}</code></td>
                            <td class="text-right">
                                <button class="btn btn-info btn-sm view-script-btn" 
                                        data-path="{{ script.chall_name }}/{{ script.exp_name }}">
                                    View
                                </button>
                                <button class="btn btn-danger btn-sm delete-script-btn" 
                                        data-path="{{ script.chall_name }}/{{ script.exp_name }}">
                                    Delete
                                </button>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="3" class="text-center text-muted">No scripts uploaded yet.</td>
                        </tr>
                        {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-light">
                <div class="card-body">
                    <h4 class="card-title">Upload / Add Script</h4>
                    <form id="add-script-form">
                        <div class="form-group">
                            <label for="chall-name-input">Challenge Name</label>
                            <input type="text" class="form-control form-control-sm" id="chall-name-input" 
                                   name="chall_name" placeholder="e.g., web_chall1" required>
                        </div>
                        <div class="form-group">
                            <label for="script-name-input">Script Filename</label>
                            <input type="text" class="form-control form-control-sm" id="script-name-input" 
                                   name="exp_name" placeholder="e.g., exp1.py" required>
                        </div>
                        <div class="form-group">
                            <label for="script-content">Python Code</label>
                            <textarea class="form-control form-control-sm text-monospace" id="script-content" 
                                      name="content" rows="10" placeholder="import requests..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm btn-block">Save Script</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="viewScriptModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal-script-title">Script Viewer</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body" id="modal-script-markdown-body">
                </div>
        </div>
    </div>
</div>

<script src="/static/js/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<script src="/static/js/scripts-ui.js"></script>
</body>
</html>
